name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: CI=1 pnpm lint

      - name: Run tests
        run: CI=1 pnpm test

      - name: Build workspace
        run: CI=1 pnpm build
